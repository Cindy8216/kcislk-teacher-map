<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中外師位置圖 · 康橋</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F0E9D6; --card:#FBF8EF; --inset:#F3ECDA;
  --ink:#2A2620; --muted:#6E6555; --line:#E1D7BF;
  --green:#15452F; --green-2:#1F6B47; --gold:#B89042; --gold-lt:#E3C97C;
  --ext:#9E3B2E; --hit:#F6E4A6;
  --shadow:0 2px 10px rgba(60,45,20,.10);
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei","Segoe UI",system-ui,sans-serif;
  --serif:"Noto Serif TC","Songti TC","Microsoft JhengHei",serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);
  line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(rgba(120,90,40,.04) 1px,transparent 1px);background-size:22px 22px}

header{background:var(--green);color:#fff;padding:26px 22px 20px;border-bottom:3px solid var(--gold)}
.hero{max-width:960px;margin:0 auto}
.eyebrow{margin:0 0 6px;font-size:12.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-lt);opacity:.92}
header h1{margin:0;font-family:var(--serif);font-size:33px;font-weight:900;color:var(--gold-lt);letter-spacing:2px;text-wrap:balance}
header .sub{margin:6px 0 16px;font-size:14px;color:#EDE7D4;opacity:.92}
.search{position:relative;max-width:560px}
.search input{width:100%;padding:12px 40px 12px 42px;border:none;border-radius:12px;font-size:16px;
  font-family:var(--sans);background:var(--card);color:var(--ink);outline:none;box-shadow:0 6px 18px rgba(0,0,0,.20)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.6;stroke:var(--green)}
.search .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;
  border:none;background:var(--line);border-radius:50%;width:23px;height:23px;line-height:23px;
  text-align:center;font-size:15px;color:var(--muted);display:none}

.tabs{display:flex;gap:9px;overflow-x:auto;padding:12px 16px;background:var(--paper);
  position:sticky;top:0;z-index:19;border-bottom:1px solid var(--line);max-width:960px;margin:0 auto}
.tab{display:flex;align-items:center;gap:7px;border:1.5px solid var(--green);background:transparent;
  color:var(--green);padding:7px 15px;border-radius:999px;font-family:var(--sans);font-size:14.5px;font-weight:500;
  white-space:nowrap;cursor:pointer;transition:.15s}
.tab .tn{font-family:var(--serif);font-size:12px;background:var(--green);color:var(--gold-lt);border-radius:6px;padding:1px 6px;font-weight:700}
.tab.active{background:var(--green);color:#fff}
.tab.active .tn{background:rgba(255,255,255,.18);color:#fff}
.tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

main{max-width:960px;margin:0 auto;padding:16px 16px 56px}
.count{font-size:14px;color:var(--muted);padding:8px 2px 4px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin:10px 0 14px;
  border-bottom:2px solid var(--line);padding-bottom:8px;flex-wrap:wrap}
.sec-head .cn{font-family:var(--serif);font-size:22px;font-weight:900;color:var(--green);letter-spacing:1px}
.sec-head .en{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

/* grade blocks */
.grade-block{margin:0 0 22px}
.grade-head{display:flex;align-items:center;gap:10px;margin:0 0 10px;flex-wrap:wrap}
.gnum{font-family:var(--serif);font-weight:900;font-size:15px;background:var(--green);color:var(--gold-lt);
  border-radius:8px;padding:3px 11px;letter-spacing:1px}
.gtitle{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--green)}
.gdao{margin-left:auto;font-size:13.5px;color:#fff;background:var(--gold);border-radius:999px;padding:3px 12px;font-weight:500}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
.hr-card{display:flex;flex-direction:column;gap:5px}
.hr-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{font-family:var(--serif);background:var(--green);color:var(--gold-lt);font-weight:900;font-size:17px;border-radius:9px;
  padding:3px 12px;min-width:46px;text-align:center;letter-spacing:1px}
.leader{font-size:12px;background:var(--gold);color:#fff;border-radius:6px;padding:2px 8px;font-weight:600}
.name{font-weight:700;font-size:17px}
.en{color:var(--muted);font-size:13.5px;font-weight:400}
.loc{font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.loc .ic{font-size:13px;opacity:.9}
.pill{background:var(--inset);color:var(--green);border:1px solid var(--line);border-radius:7px;padding:1px 9px;font-size:13px;font-weight:600}
.pill.alt{background:var(--green);color:#fff;border-color:var(--green)}
.ext{color:var(--ext);font-weight:700;font-size:12.5px}
.email{font-size:12.5px;color:var(--muted);word-break:break-all}
.email a{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted)}

/* offices */
.office{margin:18px 0}
.office h3{margin:0 0 4px;font-size:17px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--ink)}
.office .rm{font-family:var(--serif);background:var(--green);color:var(--gold-lt);border-radius:7px;padding:2px 10px;font-size:14px;font-weight:700;letter-spacing:1px}
.office .fl{font-size:13px;color:var(--gold);letter-spacing:1px}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-top:8px}
.seat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14.5px;box-shadow:var(--shadow)}
.seat .lb{font-size:12px;color:var(--green);background:var(--inset);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-right:5px}
.seat .nm{font-weight:600}
.seat .ex{float:right;color:var(--ext);font-weight:700;font-size:13px}

/* floor plans */
.fp-tabs{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
.fbtn{font-family:var(--serif);font-weight:700;border:1.5px solid var(--green);background:transparent;color:var(--green);
  border-radius:9px;padding:5px 13px;font-size:15px;cursor:pointer;transition:.12s}
.fbtn.active{background:var(--green);color:var(--gold-lt)}
.floor-group{display:none}
#sec-fl:not(.searching) .floor-group.active{display:block}
#sec-fl.searching .floor-group{display:block}
#sec-fl.searching .fp-tabs,#sec-fl.searching .fp-img{display:none}
.fp-img{width:100%;height:auto;border:1px solid var(--line);border-radius:12px;background:#fff;
  box-shadow:var(--shadow);margin-bottom:12px;cursor:zoom-in}
.fp-img.zoom{cursor:zoom-out;position:fixed;inset:0;width:100vw;height:100vh;object-fit:contain;
  background:rgba(20,15,5,.92);z-index:50;border-radius:0;padding:12px}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.room{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13.5px;box-shadow:var(--shadow)}
.room .rc{font-weight:700;color:var(--green)}
.room .rl{color:var(--muted);font-size:12.5px}
.muted{color:var(--muted);font-size:13.5px;padding:6px 2px}

.hidden{display:none!important}
mark{background:var(--hit);color:inherit;padding:0 2px;border-radius:3px}
.empty{text-align:center;color:var(--muted);padding:44px 0;font-size:16px}
footer{background:var(--green);color:#EDE7D4;text-align:center;font-size:12.5px;padding:22px;
  border-top:3px solid var(--gold);margin-top:24px}
footer .g{color:var(--gold-lt)}
</style>
</head>
<body>
<header>
  <div class="hero">
    <p class="eyebrow">KCISLK · Faculty &amp; Room Directory</p>
    <h1>中外師位置圖</h1>
    <p class="sub">康橋國際學校 · 年級導辦、班級教室、老師分機查詢</p>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#15452F" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="search" placeholder="搜尋 年級 / 班級 / 老師 / 教室 / 分機…" autocomplete="off">
      <button class="clr" id="clr" aria-label="清除">×</button>
    </div>
  </div>
</header>
<nav class="tabs" id="tabs">
  <button class="tab active" data-t="hr"><span class="tn">01</span>班級 · 導師</button>
  <button class="tab" data-t="cn"><span class="tn">02</span>中師辦公室</button>
  <button class="tab" data-t="fg"><span class="tn">03</span>外師辦公室</button>
  <button class="tab" data-t="fl"><span class="tn">04</span>樓層平面圖</button>
</nav>
<main>
  <div class="count" id="count"></div>
  <section id="sec-hr"></section>
  <section id="sec-cn" class="hidden"></section>
  <section id="sec-fg" class="hidden"></section>
  <section id="sec-fl" class="hidden"></section>
  <div class="empty hidden" id="empty">找不到符合的結果</div>
</main>
<footer>資料來源：<span class="g">中外師位置圖</span> Google 試算表 · 資料即時同步自 Google 試算表<br>康橋國際學校 林口校區</footer>
<script>
var FP_IMG = {"1":"floorplans/p1.png","2":"floorplans/p2.png","3":"floorplans/p3.png","4":"floorplans/p4.png","5":"floorplans/p5.png","6":"floorplans/p6.png","7":"floorplans/p7.png"};
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function boot(D){
  const GN={G7:'七年級',G8:'八年級',G9:'九年級',G10:'十年級',G11:'十一年級',G12:'十二年級'};
  const CNN={7:'七',8:'八',9:'九',10:'十',11:'十一',12:'十二'};
  const gradeKW=g=>{const n=g.slice(1);return g+' '+n+'年級 '+(CNN[n]||'')+'年級';};

  function hrHTML(){
    return D.gradeOrder.filter(g=>D.homeroom.some(h=>h.grade===g)).map(g=>{
      const cls=D.homeroom.filter(h=>h.grade===g);
      const o=D.gradeOffice[g];
      const cards=cls.map(h=>{
        const s=[h.cls,h.cn,h.en,h.email,gradeKW(g),h.roomCode,h.roomFloor,h.offRoom,h.offLabel,h.offFloor,h.offExt].join(' ').toLowerCase();
        return `<div class="card hr-card item" data-s="${esc(s)}">
          <div class="hr-top"><span class="badge">${esc(h.cls)}</span>${h.leader?'<span class="leader">學年主任</span>':''}</div>
          <div class="name">${esc(h.cn)} <span class="en">${esc(h.en)}</span></div>
          <div class="loc"><span class="ic">🏫</span>教室 <span class="pill">${esc(h.roomCode)}</span><span class="pill alt">${esc(h.roomFloor)}</span></div>
          <div class="loc"><span class="ic">🧑‍🏫</span>導辦 <span class="pill">${esc(h.offLabel||h.offRoom)}</span><span class="pill alt">${esc(h.offFloor)}</span>${h.offExt?('<span class="ext">分機 '+esc(h.offExt)+'</span>'):''}</div>
          ${h.email?`<div class="email">✉ <a href="mailto:${esc(h.email)}">${esc(h.email)}</a></div>`:''}
        </div>`;
      }).join('');
      return `<div class="grade-block" data-office="1">
        <div class="grade-head"><span class="gnum">${esc(g)}</span><span class="gtitle">${esc(GN[g]||g)}</span>
        ${o?`<span class="gdao">導辦 · ${esc(o.label||o.room)} · ${esc(o.room)} · ${esc(o.floor)}</span>`:''}</div>
        <div class="grid">${cards}</div></div>`;
    }).join('');
  }
  function officeHTML(list,isCN){
    return list.map(o=>{
      const seats=isCN
        ? o.members.map(m=>{const s=[m.label,m.name,m.ext,o.room,o.office].join(' ').toLowerCase();
            return `<div class="seat item" data-s="${esc(s)}">${m.label?('<span class="lb">'+esc(m.label)+'</span>'):''}<span class="nm">${esc(m.name)}</span>${m.ext?('<span class="ex">'+esc(m.ext)+'</span>'):''}</div>`;}).join('')
        : o.members.map(n=>{const s=[n,o.room,o.office].join(' ').toLowerCase();
            return `<div class="seat item" data-s="${esc(s)}"><span class="nm">${esc(n)}</span></div>`;}).join('');
      return `<div class="office" data-office="1"><h3><span class="rm">${esc(o.room)}</span> <span>${esc(o.office)}</span> <span class="fl">${esc(o.floor)}</span></h3><div class="seat-grid">${seats}</div></div>`;
    }).join('');
  }
  function floorHTML(){
    const btns=D.floorOrder.map(f=>`<button class="fbtn" data-f="${f}">${f}</button>`).join('');
    const groups=D.floorOrder.map(f=>{
      const rooms=D.floorRooms[f]||[];
      const items=rooms.map(r=>{const s=[r.code,r.space,f].join(' ').toLowerCase();
        return `<div class="room item" data-s="${esc(s)}"><span class="rc">${esc(r.code)}</span> <span class="rl">${esc(r.space)}</span></div>`;}).join('');
      const n=parseInt(f,10);
      return `<div class="floor-group" data-floor="${f}">
        <img class="fp-img" src="${FP_IMG[n]||''}" alt="${f} 平面圖">
        <div class="rooms">${items||'<div class="muted">（此樓層無教室清單，請看平面圖）</div>'}</div></div>`;
    }).join('');
    return `<div class="fp-tabs">${btns}</div>${groups}`;
  }

  const secHead=(cn,en)=>`<div class="sec-head"><span class="cn">${cn}</span><span class="en">${en}</span></div>`;
  document.getElementById('sec-hr').innerHTML = secHead('班級 · 導師','Homeroom &amp; Advisory') + hrHTML();
  document.getElementById('sec-cn').innerHTML = secHead('中師辦公室','Local Faculty Offices') + officeHTML(D.cnOffices,true);
  document.getElementById('sec-fg').innerHTML = secHead('外師辦公室','Foreign Faculty Offices') + officeHTML(D.fgOffices,false);
  document.getElementById('sec-fl').innerHTML = secHead('樓層平面圖','Floor Plans') + floorHTML();

  // floor picker + zoom
  let activeFloor='2F';
  function showFloor(f){activeFloor=f;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
    document.querySelectorAll('.floor-group').forEach(g=>g.classList.toggle('active',g.dataset.floor===f));}
  const flSecEl=document.getElementById('sec-fl');
  flSecEl.addEventListener('click',e=>{
    const b=e.target.closest('.fbtn'); if(b){showFloor(b.dataset.f);return;}
    const img=e.target.closest('.fp-img'); if(img){img.classList.toggle('zoom');}
  });
  showFloor('2F');

  const secs={hr:'sec-hr',cn:'sec-cn',fg:'sec-fg',fl:'sec-fl'};
  let active='hr';
  const q=document.getElementById('q'), clr=document.getElementById('clr');
  const count=document.getElementById('count'), empty=document.getElementById('empty');

  function setTab(t){active=t;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
    Object.entries(secs).forEach(([k,id])=>document.getElementById(id).classList.toggle('hidden',k!==t));
    filter();}
  document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)setTab(b.dataset.t);});

  function filter(){
    const term=q.value.trim().toLowerCase();
    clr.style.display=term?'block':'none';
    const searching=term.length>0;
    let total=0;
    document.querySelectorAll('.item').forEach(el=>{
      const hit=!term||el.dataset.s.includes(term);
      el.classList.toggle('hidden',!hit); if(hit)total++;});
    // floor section: browse vs search
    flSecEl.classList.toggle('searching',searching);
    flSecEl.querySelectorAll('.floor-group').forEach(gp=>{
      if(searching){gp.classList.toggle('hidden',gp.querySelectorAll('.item:not(.hidden)').length===0);}
      else{gp.classList.remove('hidden');}});
    // empty office / grade blocks
    document.querySelectorAll('[data-office]').forEach(block=>{
      block.classList.toggle('hidden',block.querySelectorAll('.item:not(.hidden)').length===0);});
    // sections
    Object.entries(secs).forEach(([k,id])=>{
      const sec=document.getElementById(id);
      if(searching){sec.classList.toggle('hidden',sec.querySelectorAll('.item:not(.hidden)').length===0);}
      else{sec.classList.toggle('hidden',k!==active);}});
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',!searching&&b.dataset.t===active));
    empty.classList.toggle('hidden',total>0);
    count.textContent=searching?(total+' 筆結果'):'';
  }
  q.addEventListener('input',filter);
  clr.addEventListener('click',()=>{q.value='';q.focus();filter();});
  filter();
}
/* Apps Script /exec 網址（改資料源改這裡）*/
var API_URL = "https://script.google.com/macros/s/AKfycby_arP77BHlP-BHuspQONEUErOKm6MVRYm7CoZ6nTYUK0AKbSiFdQuwVzrN2Q5NxOWf/exec";
(function(){
  var c=document.getElementById('count'); c.textContent='資料載入中…';
  fetch(API_URL,{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(D){ c.textContent=''; boot(D); })
    .catch(function(e){ c.innerHTML='<span style="color:#9E3B2E">⚠ 資料載入失敗，請稍後重新整理。（'+esc(String(e.message||e))+'）</span>'; });
})();
</script>
</body>
</html>
