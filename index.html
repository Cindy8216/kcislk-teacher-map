<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中外師位置圖 · 康橋</title>
<style>
:root{
  --paper:#F0E9D6; --card:#FBF8EF; --inset:#F3ECDA;
  --ink:#2A2620; --muted:#6E6555; --line:#E1D7BF;
  --green:#15452F; --green-2:#1F6B47; --gold:#B89042; --gold-lt:#E3C97C;
  --ext:#9E3B2E; --hit:#F6E4A6;
  --shadow:0 2px 10px rgba(60,45,20,.12);
  --hand:"Ink Free","DFKai-SB","標楷體","BiauKai","Kaiti TC","STKaiti","KaiTi","楷体","Segoe Print","Bradley Hand","Comic Sans MS",cursive;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--hand);background:var(--paper);color:var(--ink);
  line-height:1.6;font-size:16.5px;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(rgba(120,90,40,.045) 1px,transparent 1px);background-size:22px 22px}

header{background:var(--green);color:#fff;padding:26px 22px 20px;border-bottom:3px solid var(--gold)}
.hero{max-width:900px;margin:0 auto}
.eyebrow{margin:0 0 6px;font-size:12.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-lt);opacity:.92}
header h1{margin:0;font-size:34px;font-weight:900;color:var(--gold-lt);letter-spacing:2px;text-wrap:balance}
header .sub{margin:6px 0 16px;font-size:14.5px;color:#EDE7D4;opacity:.92}
.search{position:relative;max-width:560px}
.search input{width:100%;padding:12px 40px 12px 42px;border:none;border-radius:12px;font-size:16.5px;
  font-family:var(--hand);background:var(--card);color:var(--ink);outline:none;box-shadow:0 6px 18px rgba(0,0,0,.22)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.6;stroke:var(--green)}
.search .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;
  border:none;background:var(--line);border-radius:50%;width:23px;height:23px;line-height:23px;
  text-align:center;font-size:15px;color:var(--muted);display:none}

.tabs{display:flex;gap:9px;overflow-x:auto;padding:12px 16px;background:var(--paper);
  position:sticky;top:0;z-index:19;border-bottom:1px solid var(--line);max-width:900px;margin:0 auto}
.tab{display:flex;align-items:center;gap:7px;border:1.5px solid var(--green);background:transparent;
  color:var(--green);padding:7px 15px;border-radius:999px;font-family:var(--hand);font-size:15px;
  white-space:nowrap;cursor:pointer;transition:.15s}
.tab .tn{font-size:12px;background:var(--green);color:var(--gold-lt);border-radius:6px;padding:1px 6px;font-weight:700}
.tab.active{background:var(--green);color:#fff}
.tab.active .tn{background:rgba(255,255,255,.18);color:#fff}
.tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

main{max-width:900px;margin:0 auto;padding:16px 16px 56px}
.count{font-size:14px;color:var(--muted);padding:8px 2px 4px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin:10px 0 14px;
  border-bottom:2px dashed var(--line);padding-bottom:8px;flex-wrap:wrap}
.sec-head .cn{font-size:23px;font-weight:900;color:var(--green);letter-spacing:1px}
.sec-head .en{font-size:12.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(242px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
.hr-card{display:flex;flex-direction:column;gap:5px}
.hr-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{background:var(--green);color:var(--gold-lt);font-weight:900;font-size:17px;border-radius:9px;
  padding:3px 12px;min-width:46px;text-align:center;letter-spacing:1px}
.leader{font-size:12px;background:var(--gold);color:#fff;border-radius:6px;padding:2px 8px;font-weight:700}
.name{font-weight:700;font-size:18px}
.en{color:var(--muted);font-size:14px;font-weight:400}
.loc{font-size:14px;color:var(--green);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pill{background:var(--inset);color:var(--green);border:1px solid var(--line);border-radius:7px;padding:1px 9px;font-size:13px}
.email{font-size:13px;color:var(--muted);word-break:break-all}
.email a{color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted)}

.office{margin:18px 0}
.office h3{margin:0 0 4px;font-size:18px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--ink)}
.office .rm{background:var(--green);color:var(--gold-lt);border-radius:7px;padding:2px 10px;font-size:14px;font-weight:700;letter-spacing:1px}
.office .fl{font-size:13px;color:var(--gold);letter-spacing:1px}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px;margin-top:8px}
.seat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:15px;box-shadow:var(--shadow)}
.seat .lb{font-size:12px;color:var(--green);background:var(--inset);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-right:5px}
.seat .nm{font-weight:700}
.seat .ex{float:right;color:var(--ext);font-weight:700;font-size:14px}

.floor-sec{margin:16px 0}
.floor-sec h3{margin:0 0 8px;font-size:19px;color:var(--green);display:flex;align-items:center;gap:9px}
.floor-sec h3::before{content:"";width:22px;height:2px;background:var(--gold)}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:8px}
.room{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:14px;box-shadow:var(--shadow)}
.room .rc{font-weight:700;color:var(--green)}
.room .rl{color:var(--muted);font-size:13px}

.hidden{display:none!important}
mark{background:var(--hit);color:inherit;padding:0 2px;border-radius:3px}
.empty{text-align:center;color:var(--muted);padding:44px 0;font-size:16px}
footer{background:var(--green);color:#EDE7D4;text-align:center;font-size:12.5px;padding:22px;
  border-top:3px solid var(--gold);margin-top:24px}
footer .g{color:var(--gold-lt)}
</style>
</head>
<body>
<header>
  <div class="hero">
    <p class="eyebrow">KCISLK · Faculty &amp; Room Directory</p>
    <h1>中外師位置圖</h1>
    <p class="sub">康橋國際學校 · 老師、班級、教室、分機查詢</p>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#15452F" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="search" placeholder="搜尋 老師 / 班級 / 教室 / 分機…" autocomplete="off">
      <button class="clr" id="clr" aria-label="清除">×</button>
    </div>
  </div>
</header>
<nav class="tabs" id="tabs">
  <button class="tab active" data-t="hr"><span class="tn">01</span>導師 · 班級</button>
  <button class="tab" data-t="cn"><span class="tn">02</span>中師辦公室</button>
  <button class="tab" data-t="fg"><span class="tn">03</span>外師辦公室</button>
  <button class="tab" data-t="fl"><span class="tn">04</span>各樓層教室</button>
</nav>
<main>
  <div class="count" id="count"></div>
  <section id="sec-hr"></section>
  <section id="sec-cn" class="hidden"></section>
  <section id="sec-fg" class="hidden"></section>
  <section id="sec-fl" class="hidden"></section>
  <div class="empty hidden" id="empty">找不到符合的結果</div>
</main>
<footer>資料來源：<span class="g">中外師位置圖</span> Google 試算表 · 資料即時同步自 Google 試算表<br>康橋國際學校 林口校區</footer>
<script>
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function boot(D){
// build homeroom cards
function hrHTML(){
  return '<div class="grid">'+D.homeroom.map(h=>{
    const search=[h.cls,h.cn,h.en,h.email,h.floor,h.space,h.code].join(' ').toLowerCase();
    return `<div class="card hr-card item" data-s="${esc(search)}">
      <div class="hr-top"><span class="badge">${esc(h.cls)}</span>
        ${h.leader?'<span class="leader">學年主任</span>':''}</div>
      <div class="name">${esc(h.cn)} <span class="en">${esc(h.en)}</span></div>
      <div class="loc">📍 ${h.floor?('<span class="pill">'+esc(h.floor)+'</span>'):''}
        ${h.code?('<span class="pill">'+esc(h.code)+'</span>'):''}
        ${h.space?('<span>'+esc(h.space)+'</span>'):''}</div>
      ${h.email?('<div class="email">✉ <a href="mailto:'+esc(h.email)+'">'+esc(h.email)+'</a></div>'):''}
    </div>`;
  }).join('')+'</div>';
}
function officeHTML(list, isCN){
  return list.map(o=>{
    const seats = isCN
      ? o.members.map(m=>{
          const s=[m.label,m.name,m.ext,o.room,o.office].join(' ').toLowerCase();
          return `<div class="seat item" data-s="${esc(s)}">${m.label?('<span class="lb">'+esc(m.label)+'</span>'):''}<span class="nm">${esc(m.name)}</span>${m.ext?('<span class="ex">'+esc(m.ext)+'</span>'):''}</div>`;
        }).join('')
      : o.members.map(n=>{
          const s=[n,o.room,o.office].join(' ').toLowerCase();
          return `<div class="seat item" data-s="${esc(s)}"><span class="nm">${esc(n)}</span></div>`;
        }).join('');
    return `<div class="office" data-office="1">
      <h3><span class="rm">${esc(o.room)}</span> <span>${esc(o.office)}</span> <span class="fl">${esc(o.floor)}</span></h3>
      <div class="seat-grid">${seats}</div></div>`;
  }).join('');
}
function floorHTML(){
  return D.floorOrder.map(f=>{
    const rooms=D.floorRooms[f]; if(!rooms.length) return '';
    const items=rooms.map(r=>{
      const s=[r.code,r.label,f].join(' ').toLowerCase();
      return `<div class="room item" data-s="${esc(s)}"><span class="rc">${esc(r.code||'·')}</span> <span class="rl">${esc(r.label)}</span></div>`;
    }).join('');
    return `<div class="floor-sec" data-office="1"><h3>${esc(f)}</h3><div class="rooms">${items}</div></div>`;
  }).join('');
}

const secHead=(cn,en)=>`<div class="sec-head"><span class="cn">${cn}</span><span class="en">${en}</span></div>`;
document.getElementById('sec-hr').innerHTML = secHead('導師 · 班級','Homeroom Teachers') + hrHTML();
document.getElementById('sec-cn').innerHTML = secHead('中師辦公室','Local Faculty Offices') + officeHTML(D.cnOffices,true);
document.getElementById('sec-fg').innerHTML = secHead('外師辦公室','Foreign Faculty Offices') + officeHTML(D.fgOffices,false);
document.getElementById('sec-fl').innerHTML = secHead('各樓層教室','Classrooms by Floor') + floorHTML();

const secs={hr:'sec-hr',cn:'sec-cn',fg:'sec-fg',fl:'sec-fl'};
let active='hr';
const q=document.getElementById('q'), clr=document.getElementById('clr');
const count=document.getElementById('count'), empty=document.getElementById('empty');

function setTab(t){
  active=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  Object.entries(secs).forEach(([k,id])=>document.getElementById(id).classList.toggle('hidden',k!==t));
  filter();
}
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(b) setTab(b.dataset.t);
});

function filter(){
  const term=q.value.trim().toLowerCase();
  clr.style.display=term?'block':'none';
  const searching = term.length>0;
  let total=0;
  document.querySelectorAll('.item').forEach(el=>{
    const hit = !term || el.dataset.s.includes(term);
    el.classList.toggle('hidden',!hit);
    if(hit) total++;
  });
  // hide empty office/floor blocks
  document.querySelectorAll('[data-office]').forEach(block=>{
    const any=block.querySelectorAll('.item:not(.hidden)').length>0;
    block.classList.toggle('hidden',!any);
  });
  // sections: when searching show only those with matches; else only the active tab
  Object.entries(secs).forEach(([k,id])=>{
    const sec=document.getElementById(id);
    if(searching){
      const any=sec.querySelectorAll('.item:not(.hidden)').length>0;
      sec.classList.toggle('hidden',!any);
    } else {
      sec.classList.toggle('hidden',k!==active);
    }
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', !searching && b.dataset.t===active));
  empty.classList.toggle('hidden', total>0);
  count.textContent = searching ? (total+' 筆結果') : '';
}
q.addEventListener('input',filter);
clr.addEventListener('click',()=>{q.value='';q.focus();filter();});
filter();
}
/* Apps Script /exec 網址（改資料源改這裡）*/
var API_URL = "https://script.google.com/macros/s/AKfycby_arP77BHlP-BHuspQONEUErOKm6MVRYm7CoZ6nTYUK0AKbSiFdQuwVzrN2Q5NxOWf/exec";
(function(){
  var c=document.getElementById('count');
  c.textContent='資料載入中…';
  fetch(API_URL,{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(D){ c.textContent=''; boot(D); })
    .catch(function(e){ c.innerHTML='<span style="color:#9E3B2E">⚠ 資料載入失敗，請稍後重新整理。（'+esc(String(e.message||e))+'）</span>'; });
})();
</script>
</body>
</html>
